<!DOCTYPE html>
<html lang="fr" data-theme="declic">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration – Tickets DEClic Digital</title>
    
    <!-- Tailwind & DaisyUI CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.1/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                brand: { pink: '#E91E63', dark: '#0D1117' }
              }
            }
          },
          daisyui: {
            themes: [{ declic: { "primary": "#E91E63", "secondary": "#0D1117", "accent": "#F06292", "neutral": "#1f2937", "base-100": "#ffffff" } }]
          }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Outfit', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen">

    <div class="flex flex-col lg:flex-row">
        <!-- Sidebar -->
        <aside class="w-full lg:w-64 bg-brand-dark text-white lg:min-h-screen p-6">
            <div class="flex items-center gap-2 mb-12">
                <img src="declic logo.jpeg" alt="Logo" class="h-10 w-10 object-contain invert brightness-0">
                <span class="text-xl font-bold">Admin <span class="text-brand-pink">DEClic</span></span>
            </div>
            <nav class="space-y-2">
                <a href="#" class="flex items-center gap-3 px-4 py-3 bg-brand-pink rounded-xl text-white font-semibold">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>
                    Tableau de bord
                </a>
                <a href="index.html" class="flex items-center gap-3 px-4 py-3 text-gray-400 hover:text-white transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
                    Voir le site
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-6 lg:p-12">
            <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-12">
                <div>
                    <h1 class="text-3xl font-bold text-brand-dark">Gestion des Tickets</h1>
                    <p class="text-gray-500">Suivi en temps réel des ventes pour 2026</p>
                </div>
                <div class="flex gap-4">
                    <a href="/tickets/export" class="btn btn-primary rounded-full px-8 text-white border-none shadow-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                        Exporter CSV
                    </a>
                </div>
            </header>

            <!-- Stats -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-12">
                <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100 flex items-center gap-6">
                    <div class="w-16 h-16 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-600">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z" /></svg>
                    </div>
                    <div>
                        <p class="text-gray-500 font-medium">Tickets Vendus</p>
                        <h2 id="totalCount" class="text-4xl font-bold text-brand-dark">0</h2>
                    </div>
                </div>
                <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100 flex items-center gap-6">
                    <div class="w-16 h-16 bg-pink-50 rounded-2xl flex items-center justify-center text-brand-pink">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                    </div>
                    <div>
                        <p class="text-gray-500 font-medium">Chiffre d'Affaires</p>
                        <h2 id="totalAmount" class="text-4xl font-bold text-brand-dark">0 FCFA</h2>
                    </div>
                </div>
            </div>

            <!-- Table -->
            <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="p-8 border-b border-gray-50">
                    <h3 class="font-bold text-xl">Dernières inscriptions</h3>
                </div>
                <div class="overflow-x-auto">
                    <table class="table table-zebra w-full" id="ticketsTable">
                        <thead>
                            <tr class="bg-gray-50/50">
                                <th>Produit</th>
                                <th>Client</th>
                                <th>Montant</th>
                                <th>Contact</th>
                                <th>Date</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr><td colspan="5" class="text-center py-8 text-gray-400">Chargement des données...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        async function loadTickets() {
            try {
                const resp = await fetch('/tickets');
                if (!resp.ok) throw new Error('Erreur serveur');
                const data = await resp.json();
                const { stats, tickets } = data;

                document.getElementById('totalCount').textContent = stats.total_count;
                document.getElementById('totalAmount').textContent = `${Number(stats.total_amount).toLocaleString('fr-FR')} FCFA`;

                const tbody = document.getElementById('ticketsTable').querySelector('tbody');
                tbody.innerHTML = '';
                
                if (tickets.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center py-8">Aucun ticket enregistré.</td></tr>';
                    return;
                }
                
                tickets.forEach(t => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td class="font-bold text-brand-pink">${t.product}</td>
                        <td>
                            <div class="font-bold">${t.name || '—'}</div>
                            <div class="text-xs opacity-50">${t.email || '—'}</div>
                        </td>
                        <td class="font-semibold">${Number(t.amount).toLocaleString('fr-FR')} FCFA</td>
                        <td>${t.phone || '—'}</td>
                        <td class="text-sm opacity-60">${new Date(t.timestamp).toLocaleString('fr-FR')}</td>
                    `;
                    tbody.appendChild(tr);
                });

            } catch (e) {
                console.error(e);
                const tbody = document.getElementById('ticketsTable').querySelector('tbody');
                tbody.innerHTML = '<tr><td colspan="5" class="text-center py-8 text-error">Impossible de charger les tickets.</td></tr>';
            }
        }

        loadTickets();
    </script>
</body>
</html>
