<!DOCTYPE html>
<html lang="fr" data-theme="declic">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merci pour votre inscription | DEClic Digital</title>
    
    <!-- Tailwind & DaisyUI CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.1/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                brand: { pink: '#E91E63', dark: '#0D1117' }
              }
            }
          },
          daisyui: {
            themes: [{ declic: { "primary": "#E91E63", "secondary": "#0D1117", "accent": "#F06292", "neutral": "#1f2937", "base-100": "#ffffff" } }]
          }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .hero-gradient { background: linear-gradient(135deg, #0D1117 0%, #1a1f2e 100%); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-2xl w-full bg-white rounded-[3rem] shadow-2xl overflow-hidden border border-gray-100">
        <div class="hero-gradient p-12 text-center text-white relative">
            <div class="absolute inset-0 overflow-hidden pointer-events-none">
                <div class="absolute -top-12 -left-12 w-48 h-48 bg-brand-pink/20 rounded-full blur-3xl"></div>
            </div>
            <div class="relative z-10">
                <div class="w-20 h-20 bg-white/10 rounded-full flex items-center justify-center mx-auto mb-6 backdrop-blur-sm border border-white/20">
                    <span id="status-icon" class="text-4xl animate-bounce">⏳</span>
                </div>
                <h1 id="status-title" class="text-3xl font-bold mb-2">Vérification en cours</h1>
                <p id="status-text" class="text-gray-400">Nous validons votre transaction auprès de FedaPay...</p>
            </div>
        </div>

        <div class="p-12" id="details-container" style="display:none;">
            <div class="text-center mb-10">
                <h2 class="text-2xl font-bold text-brand-dark mb-2">Félicitations !</h2>
                <p class="text-gray-500">Votre place est réservée pour DEClic Digital 2026.</p>
            </div>

            <div class="bg-gray-50 rounded-3xl p-8 border border-gray-100 mb-10">
                <div class="flex flex-col items-center">
                    <canvas id="qr" class="mb-6 rounded-xl shadow-lg bg-white p-4"></canvas>
                    <p id="ticket-id-display" class="text-brand-pink font-bold text-sm tracking-widest uppercase"></p>
                    <div id="details" class="text-center mt-4 font-semibold text-brand-dark"></div>
                </div>
            </div>

            <div class="space-y-4">
                <div class="flex items-center gap-4 p-4 rounded-2xl bg-blue-50 text-blue-700 text-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                    <p>Un email de confirmation contenant votre ticket a été envoyé à votre adresse.</p>
                </div>
                <a href="index.html" class="btn btn-primary w-full rounded-2xl text-white border-none shadow-lg">Retour à l'accueil</a>
            </div>
        </div>
        
        <div id="error-actions" class="p-12 text-center" style="display:none;">
            <a href="index.html" class="btn btn-outline btn-primary w-full rounded-2xl">Réessayer ou contacter le support</a>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const fedaId = params.get('id');
        let attempts = 0;
        const maxAttempts = 10;

        async function verifyTicket() {
            if (!fedaId) {
                updateStatus("❌", "Erreur de transaction", "ID de transaction introuvable.");
                document.getElementById('error-actions').style.display = 'block';
                return;
            }

            try {
                const resp = await fetch(`/tickets/verify/${fedaId}`);
                if (resp.ok) {
                    const ticket = await resp.json();
                    showSuccess(ticket);
                } else {
                    if (attempts < maxAttempts) {
                        attempts++;
                        setTimeout(verifyTicket, 2000);
                    } else {
                        updateStatus("⚠️", "Paiement en attente", "Votre paiement est confirmé par FedaPay, mais notre système est en cours de traitement. Un email vous sera envoyé d'ici peu.");
                    }
                }
            } catch (e) {
                console.error(e);
                if (attempts < maxAttempts) {
                    attempts++;
                    setTimeout(verifyTicket, 2000);
                }
            }
        }

        function updateStatus(icon, title, text) {
            document.getElementById('status-icon').textContent = icon;
            document.getElementById('status-title').textContent = title;
            document.getElementById('status-text').textContent = text;
        }

        function showSuccess(ticket) {
            updateStatus("✅", "Paiement Réussi", "Merci pour votre confiance !");
            document.getElementById('status-icon').classList.remove('animate-bounce');
            document.getElementById('details-container').style.display = "block";
            document.getElementById('details').textContent = `${ticket.product} — ${Number(ticket.amount).toLocaleString('fr-FR')} FCFA`;
            document.getElementById('ticket-id-display').textContent = `TICKET ID: ${ticket.id}`;

            new QRious({
                element: document.getElementById('qr'),
                size: 200,
                value: `ID:${ticket.id}|FedaID:${ticket.feda_id}|Prod:${ticket.product}`
            });
        }

        verifyTicket();
    </script>
</body>
</html>
